spring.application.name=AutoMarket


spring.datasource.url=jdbc:postgresql://localhost:5432/automarket
spring.datasource.username=postgres
spring.datasource.password=root123
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true



jwt.secret=ThisIsVeryLongSecureSecretKeyForAutoMarketJwtAtLeast64CharsNoSpecial1234567890abcdef
jwt.expiration=86400000

server.forward-headers-strategy=framework

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
server.tomcat.remoteip.protocol-header=x-forwarded-proto
server.tomcat.remoteip.remote-ip-header=x-forwarded-for

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.org.example.fileupload=DEBUG